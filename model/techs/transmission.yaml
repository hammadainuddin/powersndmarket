##
## Transmission technology definitions
## Intra-region: copper plate (no loss, unconstrained)
## Inter-region: Sabah-Sarawak HVDC cable (investable, available from 2035)
##

techs:

  free_transmission:
    essentials:
      name: 'Intra-region transmission (copper plate)'
      color: '#607d8b'
      parent: transmission
      carrier: electricity
    constraints:
      energy_eff: 1.0
      energy_cap_max: inf
    costs:
      monetary:
        interest_rate: 0.07
        energy_cap: 0
        om_annual: 0

  hvdc_sabah_sarawak:
    essentials:
      name: 'Sabah-Sarawak HVDC interconnector'
      color: '#ff5722'
      parent: transmission
      carrier: electricity
    constraints:
      energy_eff: 0.97           # 3% transmission loss over ~600km
      energy_cap_max: 1000       # Max 1,000 MW cable capacity
      lifetime: 40
    costs:
      monetary:
        interest_rate: 0.07
        energy_cap: 1500000      # ~1500 USD/kW for submarine HVDC
        om_annual: 20000         # 20 USD/kW/yr

## Links are defined per-region in location files.
## The HVDC cable between Sabah and Sarawak is available only from 2035.
## In the myopic chain, energy_cap_max is set to 0 before 2035.
