##
## Supply technology definitions
## All costs in USD (2023 real terms)
## Energy: MW / MWh, costs: USD/MW or USD/MWh
##

techs:

  ## -------------------------------------------------------
  ## FOSSIL FUEL TECHNOLOGIES
  ## -------------------------------------------------------

  coal_existing:
    essentials:
      name: 'Coal power plant (existing)'
      color: '#3d3d3d'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 0.38            # ~38% net efficiency (sub-critical/supercritical mix)
      lifetime: 30
      energy_ramping: 0.15       # 15% ramp rate per hour (coal is slow to ramp)
      # energy_cap controlled entirely by location files + override_dict per milestone year
    costs:
      monetary:
        interest_rate: 0.08
        energy_cap: 0            # Existing: no new capex
        om_con: 43               # $43/MWh: fuel ~$39 (coal $100/t, 38% eff) + $4 O&M
        om_annual: 30000         # Fixed O&M: 30 USD/kW/yr

  coal_new:
    essentials:
      name: 'Coal power plant (new build)'
      color: '#555555'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 0.42           # Supercritical new build
      lifetime: 30
      energy_ramping: 0.15       # 15% ramp rate per hour
      energy_cap_max: 0          # Set per location (zero in Sabah)
    costs:
      monetary:
        interest_rate: 0.08
        energy_cap: 1800000      # 1800 USD/kW capex
        om_con: 38               # $38/MWh: fuel ~$35 (coal $100/t, 42% eff) + $3 O&M
        om_annual: 35000

  gas_ccgt:
    essentials:
      name: 'Gas combined cycle (CCGT)'
      color: '#d4a017'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 0.52
      lifetime: 25
      energy_ramping: 0.9
    costs:
      monetary:
        interest_rate: 0.08
        energy_cap: 900000       # 900 USD/kW
        om_con: 72               # $72/MWh: fuel ~$69 (LNG $10/GJ, 52% eff) + $3 O&M
        om_annual: 25000         # 25 USD/kW/yr fixed O&M

  gas_ocgt:
    essentials:
      name: 'Gas open cycle peaker (OCGT)'
      color: '#e8c547'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 0.35
      lifetime: 20
      energy_ramping: 1.0       # Fast ramping
    costs:
      monetary:
        interest_rate: 0.08
        energy_cap: 550000       # 550 USD/kW
        om_con: 124              # $124/MWh: fuel ~$120 (LNG $10/GJ, 35% eff) + $4 O&M
        om_annual: 18000

  diesel_genset:
    essentials:
      name: 'Diesel generator (emergency/remote)'
      color: '#a05000'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 0.30
      lifetime: 15
      energy_ramping: 1.0
      energy_cap_max: 0          # Set per location
    costs:
      monetary:
        interest_rate: 0.08
        energy_cap: 400000
        om_con: 280              # $280/MWh: diesel ~$1.2/L, 30% eff → ~$270/MWh fuel + $10 O&M
        om_annual: 15000

  ## -------------------------------------------------------
  ## HYDROPOWER
  ## -------------------------------------------------------

  hydro_large_existing:
    essentials:
      name: 'Large hydropower (existing dams)'
      color: '#1a6bb5'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 1.0            # CF handled via resource time series
      resource: file=hydro_cf.csv
      resource_unit: energy_per_cap
      lifetime: 60
      force_resource: False      # Can curtail
      # energy_cap controlled by location files + override_dict per milestone year
    costs:
      monetary:
        interest_rate: 0.05
        energy_cap: 0            # Existing: sunk cost
        om_annual: 15000         # 15 USD/kW/yr fixed O&M

  hydro_ror:
    essentials:
      name: 'Run-of-river hydropower (new)'
      color: '#2a9bd4'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 1.0
      resource: file=hydro_cf.csv
      resource_unit: energy_per_cap
      lifetime: 40
      force_resource: False
      energy_cap_max: 0          # Set per location
    costs:
      monetary:
        interest_rate: 0.06
        energy_cap: 2500000      # 2500 USD/kW (greenfield hydro)
        om_annual: 30000

  ## -------------------------------------------------------
  ## RENEWABLE ENERGY
  ## -------------------------------------------------------

  solar_utility:
    essentials:
      name: 'Utility-scale solar PV'
      color: '#f5c518'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 1.0
      resource: file=solar_cf.csv
      resource_unit: energy_per_cap
      force_resource: True       # Must use solar when available (set by CF)
      lifetime: 25
      energy_cap_max: inf        # Unconstrained (land assumed available)
    costs:
      monetary:
        interest_rate: 0.07
        energy_cap: 650000       # 650 USD/kW (IRENA 2023 Malaysia-adjusted)
        om_annual: 8000          # 8 USD/kW/yr

  solar_rooftop:
    essentials:
      name: 'Rooftop solar PV (NEM)'
      color: '#ffd700'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 1.0
      resource: file=solar_cf.csv
      resource_unit: energy_per_cap
      force_resource: True
      lifetime: 25
      energy_cap_max: 0          # Set per location (rooftop potential ceiling)
    costs:
      monetary:
        interest_rate: 0.07
        energy_cap: 900000       # Higher cost: installation, inverter, etc.
        om_annual: 10000

  wind_onshore:
    essentials:
      name: 'Onshore wind'
      color: '#8bc34a'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 1.0
      resource: file=wind_cf.csv
      resource_unit: energy_per_cap
      force_resource: True
      lifetime: 25
      energy_cap_max: 0          # Set per location (zero in Sarawak, low in Peninsular)
    costs:
      monetary:
        interest_rate: 0.07
        energy_cap: 1300000      # 1300 USD/kW (Malaysia: low wind, higher cost relative to solar)
        om_annual: 30000

  biomass_plant:
    essentials:
      name: 'Biomass power plant'
      color: '#4caf50'
      parent: supply
      carrier_out: electricity
    constraints:
      energy_eff: 0.28           # Biomass steam cycle
      lifetime: 20
      energy_ramping: 0.5
      energy_cap_max: 0          # Set per location
    costs:
      monetary:
        interest_rate: 0.07
        energy_cap: 3500000      # 3500 USD/kW (high capex)
        om_con: 0.005
        om_annual: 80000         # High fixed O&M
