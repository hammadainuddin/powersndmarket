import:
- techs/supply.yaml
- techs/storage.yaml
- techs/demand.yaml
- techs/transmission.yaml
- locations/peninsular.yaml
model:
  name: Malaysia Peninsular 2040 (netr_target)
  calliope_version: 0.6.10
  timeseries_data_path: timeseries/peninsular
  subset_time:
  - '2025-01-01 00:00:00'
  - '2025-01-24 23:00:00'
run:
  mode: plan
  solver: appsi_highs
  solver_options: {}
  backend: pyomo
  objective_options:
    cost_class:
      monetary: 1
    sense: minimize
